<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Internship App{% endblock %}</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f6f9; color: #333; }
        nav { background-color: #1e293b; padding: 15px; text-align: center; }
        nav a { color: #f8fafc; text-decoration: none; margin: 0 15px; font-weight: bold; }
        nav a:hover { color: #38bdf8; }
        .container { max-width: 800px; margin: 30px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        footer { text-align: center; padding: 20px; color: #64748b; font-size: 0.9em; margin-top: 40px; }
    </style>
</head>
<body>

    <nav>
        <a href="{% url 'home_route' %}">📊 Dashboard Home</a>
        <a href="{% url 'about_route' %}">ℹ️ About Tracker</a>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer>
        {% block footer %}
        <p>&copy; 2026 Personal Internship Tracker. Built with Django.</p>
        {% endblock %}
    </footer>

</body>
</html>
